
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestres da Obra - MZ | Gestor Pró</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #1e3a8a; /* Azul Profissional */
            --accent: #22c55e;  /* Verde Sucesso/Dinheiro */
            --bg-light: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-light);
            /* Fundo Premium com Gradiente Suave */
            background-image: 
                radial-gradient(at 10% 10%, rgba(30, 58, 138, 0.08) 0px, transparent 40%),
                radial-gradient(at 90% 90%, rgba(34, 197, 94, 0.05) 0px, transparent 40%);
            margin: 0; 
            padding: 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container Principal com Efeito Glassmorphism */
        .app-container { 
            width: 100%;
            max-width: 420px; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px);
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
        }

        /* Estilização do Logótipo Fictício */
        .logo-header {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 2.5rem;
            color: var(--primary);
            background: #e0e7ff;
            padding: 10px;
            border-radius: 15px;
        }
        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
            letter-spacing: -1px;
        }
        .logo-text p {
            font-size: 0.8rem;
            margin: 0;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .section { margin-bottom: 18px; }
        
        /* Estilização de Rótulos com Ícones */
        label { 
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600; 
            font-size: 0.9rem;
            color: var(--text-main); 
            margin-bottom: 8px;
        }
        label i { color: var(--text-muted); font-size: 1rem; }

        input { 
            width: 100%; 
            padding: 14px 18px; 
            border: 2px solid #e5e7eb; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: all 0.3s ease;
            background: #f9fafb;
        }
        input:focus {
            border-color: var(--primary);
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }

        /* Botão de Ação Principal */
        .btn-calc { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 1rem;
            cursor: pointer; 
            margin-top: 10px; 
            transition: transform 0.2s active, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }
        .btn-calc:hover { box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4); }
        .btn-calc:active { transform: scale(0.97); }

        /* Estilização da Área de Resultado */
        .result-box { 
            margin-top: 25px; 
            padding: 20px; 
            background: #f0fdf4; 
            border-radius: 16px; 
            display: none; 
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .result-title { 
            font-size: 1.1rem;
            color: #166534;
            font-weight: 700;
            text-align: center;
            margin-top: 0; margin-bottom: 15px;
        }

        /* Itens de Resultado com Ícones */
        .item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .item-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }
        .item-label i { width: 20px; text-align: center; color: var(--primary); }
        .item-value { font-weight: 700; color: #111; }

        .price-final { 
            font-size: 1.4em; 
            color: var(--accent); 
            font-weight: 800; 
            text-align: center; 
            margin: 20px 0; 
            padding: 10px;
            background: white;
            border-radius: 10px;
            letter-spacing: -0.5px;
        }
        
        .btn-whatsapp { 
            width: 100%; 
            padding: 14px; 
            background: #25d366; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .footer-info { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            text-align: center; 
            margin-top: 25px; 
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-header">
        <i class="fas fa-tools logo-icon"></i>
        <div class="logo-text">
            <h1>Mestres da Obra</h1>
            <p>Gestor Profissional MZ</p>
        </div>
    </div>
    
    <div class="section">
        <label><i class="fas fa-cube"></i>Volume do Betão (m³)</label>
        <input type="number" id="volume" placeholder="Ex: 1.5" step="0.1">
    </div>

    <div class="section">
        <label><i class="fas fa-money-bill-wave"></i>Preço do Cimento (Saco 50kg)</label>
        <input type="number" id="pCimento" value="650">
    </div>

    <div class="section">
        <label><i class="fas fa-truck-ramp-box"></i>Preço da Areia (por m³)</label>
        <input type="number" id="pAreia" value="1200">
    </div>

    <div class="section">
        <label><i class="fas fa-mountain"></i>Preço da Brita (por m³)</label>
        <input type="number" id="pBrita" value="1800">
    </div>

    <button class="btn-calc" onclick="gerarOrcamento()">CALCULAR AGORA</button>

    <div id="resultado" class="result-box">
        <h3 class="result-title">Quantidade de Materiais</h3>
        
        <div class="item">
            <div class="item-label"><i class="fas fa-sack-xmark"></i>Cimento</div>
            <span class="item-value" id="resCimento"></span>
        </div>
        <div class="item">
            <div class="item-label"><i class="fas fa-shovels"></i>Areia</div>
            <span class="item-value" id="resAreia"></span>
        </div>
        <div class="item">
            <div class="item-label"><i class="fas fa-building"></i>Brita</div>
            <span class="item-value" id="resBrita"></span>
        </div>
        
        <h3 class="result-title" style="margin-top:15px;">Medida Prática (Latas 20L)</h3>
        <div class="item">
            <div class="item-label"><i class="fas fa-bucket"></i>Latas de Areia</div>
            <span class="item-value" id="latasAreia"></span>
        </div>
        <div class="item">
            <div class="item-label"><i class="fas fa-bucket"></i>Latas de Brita</div>
            <span class="item-value" id="latasBrita"></span>
        </div>

        <div class="price-final" id="resTotal"></div>
        
        <button class="btn-whatsapp" onclick="compartilharWhatsApp()">
            <i class="fab fa-whatsapp"></i> Enviar via WhatsApp
        </button>
    </div>

    <p class="footer-info">Cálculo padrão Traço 1:2:3 (Classe C20/25)</p>
</div>

<script>
    // Fórmulas originais mantidas
    function gerarOrcamento() {
        const vol = parseFloat(document.getElementById('volume').value);
        if (!vol) return alert("Por favor, insira o volume.");

        const pCim = parseFloat(document.getElementById('pCimento').value);
        const pAre = parseFloat(document.getElementById('pAreia').value);
        const pBri = parseFloat(document.getElementById('pBrita').value);

        const qtdCimento = Math.ceil(vol * 7); 
        const qtdAreia = vol * 0.56; 
        const qtdBrita = vol * 0.84; 

        const lAreia = Math.round(qtdAreia * 50);
        const lBrita = Math.round(qtdBrita * 50);

        const custoTotal = (qtdCimento * pCim) + (qtdAreia * pAre) + (qtdBrita * pBri);

        document.getElementById('resultado').style.display = 'block';
        document.getElementById('resCimento').innerText = qtdCimento + " sacos";
        document.getElementById('resAreia').innerText = qtdAreia.toFixed(2) + " m³";
        document.getElementById('resBrita').innerText = qtdBrita.toFixed(2) + " m³";
        document.getElementById('latasAreia').innerText = lAreia + " latas";
        document.getElementById('latasBrita').innerText = lBrita + " latas";
        
        // Formatação de Dinheiro em MT
        const formatador = new Intl.NumberFormat('pt-MZ', { style: 'currency', currency: 'MZN', minimumFractionDigits: 0 });
        document.getElementById('resTotal').innerText = "Custo: " + formatador.format(custoTotal);
        
        // Rolagem automática para o resultado
        document.getElementById('resultado').scrollIntoView({ behavior: 'smooth' });
    }

    // Função de WhatsApp original mantida
    function compartilharWhatsApp() {
        const vol = document.getElementById('volume').value;
        const total = document.getElementById('resTotal').innerText;
        const cimento = document.getElementById('resCimento').innerText;
        const latasA = document.getElementById('latasAreia').innerText;
        const latasB = document.getElementById('latasBrita').innerText;

        const texto = `*ORÇAMENTO DE MATERIAIS*%0AMestres da Obra - MZ%0A---------------------------%0AVolume da obra: ${vol} m³%0A${cimento}%0AAreia: ${latasA} latas 20L%0ABrita: ${latasB} latas 20L%0A---------------------------%0A*${total} estimativa*%0A_Gerado pelo Mestres da Obra Gestor_`;
        
        window.open(`https://wa.me/?text=${texto}`, '_blank');
    }
</script>

</body>
</html>
