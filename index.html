<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Materiais - Obra</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background-color: #eef2ff; border-left: 5px solid #2563eb; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cálculo de Betão</h2>
    <label>Volume Total do Elemento (m³):</label>
    <input type="number" id="volume" placeholder="Ex: 0.5" step="0.01">
    
    <button onclick="calcular()">Calcular Materiais</button>

    <div id="resultado" class="result" style="display:none;">
        <strong>Materiais Necessários:</strong>
        <p id="cimento"></p>
        <p id="areia"></p>
        <p id="brita"></p>
        <p id="agua"></p>
    </div>
</div>

<script>
function calcular() {
    const vol = parseFloat(document.getElementById('volume').value);
    if (!vol) return alert("Insira o volume!");

    // Constantes aproximadas para traço 1:2:3 (por m3 de betão fresco)
    // Rendimento: ~7 sacos de cimento de 50kg por m3
    const cimentoPorM3 = 7; 
    const areiaPorM3 = 0.56; // m3
    const britaPorM3 = 0.84; // m3
    const aguaPorM3 = 180;   // Litros

    // Cálculos
    const totalCimento = (vol * cimentoPorM3).toFixed(1);
    const totalAreia = (vol * areiaPorM3).toFixed(2);
    const totalBrita = (vol * britaPorM3).toFixed(2);
    const totalAgua = (vol * aguaPorM3).toFixed(0);

    // Mostrar resultados
    document.getElementById('resultado').style.display = 'block';
    document.getElementById('cimento').innerText = "Cimento: " + totalCimento + " sacos (50kg)";
    document.getElementById('areia').innerText = "Areia: " + totalAreia + " m³";
    document.getElementById('brita').innerText = "Brita: " + totalBrita + " m³";
    document.getElementById('agua').innerText = "Água: " + totalAgua + " Litros";
}
</script>

</body>
</html>
