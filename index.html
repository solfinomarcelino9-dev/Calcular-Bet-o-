<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Pró - Construção Civil</title>
    <style>
        :root { --primary: #075e54; --secondary: #25d366; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ece5dd; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        .section { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #054d44; }
        .result-box { margin-top: 20px; padding: 15px; background: #f9f9f9; border: 1px dashed var(--primary); border-radius: 5px; display: none; }
        .item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .total-price { font-size: 1.2em; color: var(--primary); font-weight: bold; text-align: center; margin-top: 10px; }
        .footer-note { font-size: 0.8em; color: #666; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Orçamento de Obra Pró</h2>
    
    <div class="section">
        <label>Volume do Betão (m³)</label>
        <input type="number" id="volume" placeholder="Ex: 1.5" step="0.1">
    </div>

    <div class="section">
        <label>Preço do Cimento (Saco 50kg)</label>
        <input type="number" id="pCimento" value="650">
    </div>

    <div class="section">
        <label>Preço da Areia (por m³)</label>
        <input type="number" id="pAreia" value="1200">
    </div>

    <div class="section">
        <label>Preço da Brita (por m³)</label>
        <input type="number" id="pBrita" value="1800">
    </div>

    <button onclick="gerarOrcamento()">GERAR ORÇAMENTO COMPLETO</button>

    <div id="resultado" class="result-box">
        <h3 style="text-align:center">Resumo de Materiais</h3>
        
        <div class="item"><span>Cimento:</span> <span id="resCimento"></span></div>
        <div class="item"><span>Areia:</span> <span id="resAreia"></span></div>
        <div class="item"><span>Brita:</span> <span id="resBrita"></span></div>
        
        <h3 style="text-align:center; margin-top:15px;">Medida Prática (Latas 20L)</h3>
        <div class="item"><span>Latas de Areia:</span> <span id="latasAreia"></span></div>
        <div class="item"><span>Latas de Brita:</span> <span id="latasBrita"></span></div>

        <div class="total-price" id="resTotal"></div>
        
        <button style="background:#25d366" onclick="compartilharWhatsApp()">Enviar via WhatsApp</button>
    </div>

    <p class="footer-note">Calculado com base no Traço 1:2:3 (Classe C20/25)</p>
</div>

<script>
function gerarOrcamento() {
    const vol = parseFloat(document.getElementById('volume').value);
    if (!vol) return alert("Por favor, insira o volume da obra.");

    // Preços
    const pCim = parseFloat(document.getElementById('pCimento').value);
    const pAre = parseFloat(document.getElementById('pAreia').value);
    const pBri = parseFloat(document.getElementById('pBrita').value);

    // Quantidades técnicas (Traço 1:2:3)
    const qtdCimento = Math.ceil(vol * 7); // Sacos
    const qtdAreia = vol * 0.56; // m3
    const qtdBrita = vol * 0.84; // m3

    // Conversão para latas de 20L (1m3 = 50 latas)
    const lAreia = Math.round(qtdAreia * 50);
    const lBrita = Math.round(qtdBrita * 50);

    // Custos
    const custoTotal = (qtdCimento * pCim) + (qtdAreia * pAre) + (qtdBrita * pBri);

    // Exibir na tela
    document.getElementById('resultado').style.display = 'block';
    document.getElementById('resCimento').innerText = qtdCimento + " sacos";
    document.getElementById('resAreia').innerText = qtdAreia.toFixed(2) + " m³";
    document.getElementById('resBrita').innerText = qtdBrita.toFixed(2) + " m³";
    document.getElementById('latasAreia').innerText = lAreia + " latas";
    document.getElementById('latasBrita').innerText = lBrita + " latas";
    document.getElementById('resTotal').innerText = "Custo Estimado: " + custoTotal.toLocaleString() + " MT";
}

function compartilharWhatsApp() {
    const vol = document.getElementById('volume').value;
    const total = document.getElementById('resTotal').innerText;
    const cimento = document.getElementById('resCimento').innerText;
    const latasA = document.getElementById('latasAreia').innerText;
    const latasB = document.getElementById('latasBrita').innerText;

    const texto = `*ORÇAMENTO DE MATERIAIS*%0A---------------------------%0AVolume: ${vol} m³%0A${cimento}%0AAreia: ${latasA} latas%0ABrita: ${latasB} latas%0A---------------------------%0A*${total}*%0A_Gerado pelo Gestor Pró_`;
    
    window.open(`https://wa.me/?text=${texto}`, '_blank');
}
</script>

</body>
                                                                                        </html>
